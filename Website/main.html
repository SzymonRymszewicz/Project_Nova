	<script>
		(function loadModuleScripts() {
			fetch('/api/modules')
				.then(response => response.json())
				.then(modules => {
					const list = Array.isArray(modules) ? modules : [];
					
					// Load CSS files
					const cssUrls = [];
					list.forEach(moduleDef => {
						const styleUrls = Array.isArray(moduleDef && moduleDef.style_urls)
							? moduleDef.style_urls
							: (moduleDef && moduleDef.style_url ? [moduleDef.style_url] : []);
						styleUrls.forEach(url => {
							const cleanUrl = `${url || ''}`.trim();
							if (cleanUrl) {
								cssUrls.push(cleanUrl);
							}
						});
					});
					
					Array.from(new Set(cssUrls)).forEach(url => {
						if (document.querySelector(`link[data-module-autoload="${url}"]`)) {
							return;
						}
						const link = document.createElement('link');
						link.rel = 'stylesheet';
						link.href = url;
						link.setAttribute('data-module-autoload', url);
						document.head.appendChild(link);
					});
					
					// Load JS files
					const jsUrls = [];
					list.forEach(moduleDef => {
						const scriptUrls = Array.isArray(moduleDef && moduleDef.script_urls)
							? moduleDef.script_urls
							: (moduleDef && moduleDef.script_url ? [moduleDef.script_url] : []);
						scriptUrls.forEach(url => {
							const cleanUrl = `${url || ''}`.trim();
							if (cleanUrl) {
								jsUrls.push(cleanUrl);
							}
						});
					});

					Array.from(new Set(jsUrls)).forEach(url => {
						if (document.querySelector(`script[data-module-autoload="${url}"]`)) {
							return;
						}
						const script = document.createElement('script');
						script.src = url;
						script.defer = true;
						script.setAttribute('data-module-autoload', url);
						document.body.appendChild(script);
					});
				})
				.catch(() => {});
		})();
	</script>
